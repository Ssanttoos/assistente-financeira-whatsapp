services:
  - type: web
    name: assistente-financeira-whatsapp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_CREDENTIALS_PATH
        value: config/firebase-credentials.json
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE_NAME
        sync: false
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
